<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PR Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #2f81f7;
    --draft: #8b949e;
    --needs: #d29922;
    --reviewed: #3fb950;
    --merged: #a371f7;
    --closed: #f85149;
    --shadow: 0 1px 3px rgba(1,4,9,.6);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: 280px; flex: none; height: 100vh; overflow: hidden;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width .2s ease;
  }
  /* full-width header bar with the logo (brand collapses to just the icon) */
  .sb-header {
    flex: none; height: 56px; display: flex; align-items: center; gap: 8px;
    padding: 0 16px; border-bottom: 1px solid var(--border);
    font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden;
  }
  .sb-header svg { fill: var(--accent); flex: none; }
  /* scrollable controls area */
  .sb-body {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 16px 16px 24px; display: flex; flex-direction: column; gap: 16px;
  }
  /* full-width bottom collapse bar */
  #sidebarToggle {
    flex: none; width: 100%; display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border: none; border-top: 1px solid var(--border);
    border-radius: 0; background: transparent; color: var(--muted);
    font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: background .15s ease, color .15s ease;
  }
  #sidebarToggle:hover { background: color-mix(in srgb, var(--text) 7%, transparent); color: var(--text); }
  #sidebarToggle svg { fill: currentColor; flex: none; display: block; transition: transform .2s ease; }
  /* collapsed → narrow rail: only the logo icon + the expand chevron */
  .app.collapsed .sidebar { width: 56px; }
  .app.collapsed .sb-header { justify-content: center; padding: 0; }
  .app.collapsed .sb-header span { display: none; }
  .app.collapsed .sb-body { display: none; }
  .app.collapsed #sidebarToggle { justify-content: center; padding-left: 0; padding-right: 0; }
  .app.collapsed .sb-toggle-label { display: none; }
  .app.collapsed #sidebarToggle svg { transform: rotate(180deg); }
  .sb-section { display: flex; flex-direction: column; gap: 8px; }
  .sb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .sb-row { display: flex; align-items: center; gap: 8px; }
  .sidebar input[type="text"] { width: 100%; box-sizing: border-box; }
  .sidebar .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .sidebar .status { font-size: 11px; min-height: 1em; }
  .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar {
    flex: none; display: flex; align-items: center; justify-content: flex-end; gap: 10px;
    padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .topbar button { display: inline-flex; align-items: center; }
  .topbar button svg { fill: currentColor; display: block; }
  .topline { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px; }
  h1 svg { fill: var(--accent); }
  .spacer { flex: 1; }
  .status { color: var(--muted); font-size: 12px; }
  .status.error { color: var(--closed); font-weight: 600; }

  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .controls + .controls { margin-top: 8px; }
  .field { display: flex; align-items: center; gap: 6px; }
  label { font-size: 12px; color: var(--muted); font-weight: 600; }
  input[type=text] {
    font: inherit; padding: 5px 8px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text);
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(47,129,247,.4); }
  button {
    font: inherit; font-weight: 600; padding: 5px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface2); color: var(--text); cursor: pointer;
  }
  button:hover { background: #30363d; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #1f6feb; }
  button:disabled { opacity: .5; cursor: default; }

  .chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    color: var(--accent);
    border-radius: 999px; padding: 3px 6px 3px 10px; font-size: 12px; font-weight: 600;
  }
  .chip.me {
    background: color-mix(in srgb, var(--reviewed) 15%, transparent);
    border-color: color-mix(in srgb, var(--reviewed) 45%, transparent);
    color: var(--reviewed);
  }
  .chip button {
    all: unset; cursor: pointer; line-height: 1; font-size: 14px;
    color: inherit; opacity: .6; padding: 0 2px;
  }
  .chip button:hover { opacity: 1; }

  /* org toggle pills */
  .org {
    cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    border-radius: 999px; padding: 3px 11px; font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .org .tick { font-size: 10px; opacity: 0; }
  .org.on { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 13%, transparent); }
  .org.on .tick { opacity: 1; }
  .org.off { opacity: .55; text-decoration: line-through; }

  .board {
    flex: 1; min-height: 0; box-sizing: border-box;
    display: grid;
    grid-template-columns: repeat(5, minmax(240px, 1fr));
    gap: 12px; padding: 16px 20px; align-items: stretch; overflow: auto;
    grid-auto-rows: minmax(0, 1fr);
  }
  .column { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-height: 80px; }
  .col-head {
    padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex: none;
    font-weight: 600; font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .col-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .col-head .win { font-weight: 400; font-size: 11px; color: var(--muted); }
  .col-head .count { margin-left: auto; background: var(--surface2); border-radius: 999px; padding: 1px 8px; font-size: 11px; color: var(--muted); }
  .col-draft .dot { background: var(--draft); }
  .col-needs .dot { background: var(--needs); }
  .col-reviewed .dot { background: var(--reviewed); }
  .col-merged .dot { background: var(--merged); }
  .col-closed .dot { background: var(--closed); }
  .col-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; min-height: 0; }
  .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 8px; font-style: italic; }

  /* themed scrollbars — global, so every scrollbar (vertical & horizontal, anywhere) matches */
  html { scrollbar-width: thin; scrollbar-color: color-mix(in srgb, var(--muted) 45%, transparent) transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, var(--muted) 45%, transparent);
    border: 2px solid transparent; border-radius: 999px; background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--accent) 75%, transparent); background-clip: padding-box; }
  ::-webkit-scrollbar-corner { background: transparent; }

  .card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 6px; text-decoration: none; color: inherit;
  }
  .card:hover { border-color: var(--accent); }
  .card .repo { font-size: 11px; color: var(--muted); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card .title:hover { color: var(--accent); }
  .card .meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .card .meta .num { color: var(--accent); font-weight: 600; }
  .avatar { width: 16px; height: 16px; border-radius: 50%; vertical-align: middle; }
  .author { display: inline-flex; align-items: center; gap: 4px; }
  .diff .add { color: var(--reviewed); font-weight: 600; }
  .diff .del { color: var(--closed); font-weight: 600; }
  .labels { display: flex; gap: 4px; flex-wrap: wrap; }
  .lbl { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid rgba(255,255,255,.15); font-weight: 600; }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .03em; }
  .badge.approved { background: color-mix(in srgb, var(--reviewed) 20%, transparent); color: var(--reviewed); }
  .badge.changes { background: color-mix(in srgb, var(--closed) 20%, transparent); color: var(--closed); }
  .badge.commented { background: color-mix(in srgb, var(--needs) 22%, transparent); color: var(--needs); }

  /* custom theme dropdown */
  .dropdown { position: relative; }
  .dd-btn {
    font: inherit; font-weight: 600; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface2); color: var(--text); cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .dd-btn:hover { border-color: var(--accent); }
  .dd-caret { fill: var(--muted); transition: transform .15s ease; }
  .dropdown.open .dd-caret { transform: rotate(180deg); }
  .dd-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 230px; max-height: 65vh; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 10px 28px rgba(0,0,0,.4);
    padding: 6px; z-index: 50; display: none;
  }
  .dropdown.open .dd-menu { display: block; }
  .dd-item {
    width: 100%; text-align: left; border: none; background: transparent;
    color: var(--text); font: inherit; padding: 7px 8px; border-radius: 6px;
    display: flex; align-items: center; gap: 10px; cursor: pointer; outline: none;
  }
  .dd-item:hover, .dd-item:focus { background: color-mix(in srgb, var(--accent) 16%, transparent); }
  .dd-name { flex: 1; white-space: nowrap; }
  .dd-check { color: var(--accent); font-weight: 700; opacity: 0; }
  .dd-item.sel .dd-check { opacity: 1; }
  .sw { display: inline-flex; gap: 3px; flex: none; }
  .sw i { width: 9px; height: 9px; border-radius: 50%; display: block; border: 1px solid rgba(127,127,127,.35); }
  .hidden { display: none !important; }

  /* signed-in user widget in the header */
  .auth { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
  .auth .avatar { width: 22px; height: 22px; }
  .auth .who { font-weight: 600; color: var(--text); }
  .auth .logout {
    font-size: 12px; font-weight: 600; text-decoration: none;
    color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px;
  }
  .auth .logout:hover { color: var(--text); border-color: var(--accent); }

  /* sign-in overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
    padding: 36px 40px; text-align: center; max-width: 360px;
  }
  .login-card .logo { fill: var(--accent); margin-bottom: 6px; }
  .login-card h2 { margin: 6px 0 4px; font-size: 20px; }
  .login-card p { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
  .gh-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent); color: #fff; text-decoration: none;
    font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 8px;
  }
  .gh-btn:hover { filter: brightness(1.08); }
  .gh-btn svg { fill: currentColor; }

  /* PR detail drawer */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 80; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 92vw); z-index: 81;
    background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0,0,0,.35);
    display: flex; flex-direction: column;
    transition: transform .18s ease;
  }
  .drawer.hidden, .backdrop.hidden { display: none; }
  .drawer.closing { transform: translateX(100%); }
  .drawer-head {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-bottom: 1px solid var(--border); flex: none;
  }
  .drawer-repo { font-size: 12px; font-weight: 600; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drawer-gh { margin-left: auto; font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .drawer-gh:hover { text-decoration: underline; }
  .drawer-close { all: unset; cursor: pointer; font-size: 22px; line-height: 1; color: var(--muted); padding: 0 4px; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { padding: 16px 18px; overflow-y: auto; }
  .drawer-body h1.pr-title { font-size: 20px; margin: 0 0 10px; line-height: 1.3; }
  .drawer-body h1.pr-title .num { color: var(--muted); font-weight: 400; }
  .pr-sub { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .pr-sub .avatar { width: 20px; height: 20px; }
  .pr-state { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 2px 9px; border-radius: 999px; color: #fff; }
  .pr-state.open { background: var(--reviewed); } .pr-state.draft { background: var(--draft); }
  .pr-state.merged { background: var(--merged); } .pr-state.closed { background: var(--closed); }
  .pr-branches code { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; font-size: 12px; }
  .pr-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 18px 0 8px; }
  .pr-body { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; background: var(--bg); overflow-wrap: anywhere; }
  .pr-body :is(h1,h2,h3){ font-size: 15px; margin: 12px 0 6px; }
  .pr-body pre { background: var(--surface2); padding: 10px; border-radius: 6px; overflow-x: auto; }
  .pr-body code { background: var(--surface2); padding: 1px 4px; border-radius: 4px; }
  .pr-body pre code { background: none; padding: 0; }
  .pr-body img { max-width: 100%; }
  .pr-body a { color: var(--accent); }
  .comment { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
  .comment-head { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; font-size: 12px; }
  .comment-head .who { font-weight: 600; color: var(--text); }
  .comment-head .when { color: var(--muted); }
  .comment-body { padding: 10px 12px; overflow-wrap: anywhere; }
  .drawer-loading, .drawer-error { color: var(--muted); font-size: 13px; padding: 8px 0; }
  .drawer-error { color: var(--closed); }

  /* timeline (comments/reviews as boxes, events as compact rows) */
  /* GitHub-style timeline: octicon nodes on a vertical rail */
  .timeline { position: relative; display: flex; flex-direction: column; gap: 6px; }
  .timeline::before { content: ""; position: absolute; left: 14px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
  .tl-item { display: grid; grid-template-columns: 30px 1fr; gap: 10px; align-items: start; position: relative; z-index: 1; }
  .tl-gutter { display: flex; justify-content: center; }
  .tl-badge { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; border: 3px solid var(--surface); box-sizing: border-box; }
  .tl-badge .oct { fill: currentColor; display: block; }
  .tl-badge.gray { background: var(--surface2); color: var(--muted); }
  .tl-badge.green { background: var(--reviewed); color: #fff; }
  .tl-badge.purple { background: var(--merged); color: #fff; }
  .tl-badge.red { background: var(--closed); color: #fff; }
  .tl-content .comment { margin: 0; }
  .tl-event { display: flex; align-items: baseline; gap: 8px; font-size: 12px; color: var(--muted); min-height: 26px; padding-top: 4px; }
  .tl-event b { color: var(--text); font-weight: 600; }
  .tl-event code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
  .tl-event a { color: var(--accent); }
  .tl-text { flex: 1; overflow-wrap: anywhere; }
  .tl-when { flex: none; white-space: nowrap; }
  .review-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 1px 6px; border-radius: 4px; }
  .review-tag.approved { background: color-mix(in srgb, var(--reviewed) 22%, transparent); color: var(--reviewed); }
  .review-tag.changes  { background: color-mix(in srgb, var(--closed) 22%, transparent); color: var(--closed); }
  .review-tag.commented { background: color-mix(in srgb, var(--muted) 22%, transparent); color: var(--muted); }
  .comment-head .when { margin-left: auto; }

  /* review threads (grouped inline diff comments, with status) */
  .thread { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .thread > summary { cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); font-size: 12px; list-style: none; }
  .thread > summary::-webkit-details-marker { display: none; }
  .rc-loc { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thread-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 1px 6px; border-radius: 4px; }
  .thread-tag.unresolved { margin-left: auto; background: color-mix(in srgb, var(--needs) 22%, transparent); color: var(--needs); }
  .thread-tag.resolved   { margin-left: auto; background: color-mix(in srgb, var(--reviewed) 22%, transparent); color: var(--reviewed); }
  .thread-tag.outdated   { background: var(--bg); color: var(--muted); }
  .rc-diff { margin: 0; padding: 6px 0; font-size: 11px; background: var(--bg); overflow-x: auto; border-top: 1px solid var(--border); }
  .rc-diff .dl { display: block; padding: 0 10px; white-space: pre; }
  .rc-diff .dl.add  { background: color-mix(in srgb, var(--reviewed) 18%, transparent); }
  .rc-diff .dl.del  { background: color-mix(in srgb, var(--closed) 18%, transparent); }
  .rc-diff .dl.hunk { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .rc-diff .dl.ctx  { color: var(--muted); }
  .tc { border-top: 1px solid var(--border); }
  .rc-head { display: flex; align-items: center; gap: 6px; padding: 6px 10px 0; font-size: 12px; }
  .rc-head .who { font-weight: 600; } .rc-head .when { margin-left: auto; color: var(--muted); }
  .tc .comment-body { padding: 4px 10px 8px; }

  /* ===================================================================== */
  /* Tailwind-UI-style polish — layered on top of the themes (CSS only).    */
  /* ===================================================================== */
  :root { --ring: color-mix(in srgb, var(--accent) 55%, transparent); }
  body {
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.006em;
  }

  /* Buttons — solid primary, subtle secondary, ring on keyboard focus */
  button, .dd-btn {
    border-radius: 8px; font-weight: 500;
    transition: background .15s ease, box-shadow .15s ease, border-color .15s ease, filter .15s ease;
  }
  button.primary { box-shadow: 0 1px 2px rgba(0,0,0,.10); }
  button.primary:hover { filter: brightness(1.06); }
  button:not(.primary):hover, .dd-btn:hover { background: color-mix(in srgb, var(--text) 7%, var(--surface2)); }
  button:focus-visible, .dd-btn:focus-visible, .gh-btn:focus-visible,
  input:focus-visible, .org:focus-visible, .dd-item:focus-visible {
    outline: none; box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--ring);
  }

  /* Inputs — rounded, ring focus */
  input[type="text"], input[type="password"] {
    border-radius: 8px; padding: 6px 10px;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring);
  }

  /* Cards — shadow-sm, lift + stronger shadow on hover */
  .card {
    border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.06);
    transition: box-shadow .16s ease, transform .16s ease, border-color .16s ease;
  }
  .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.12); transform: translateY(-1px); }

  /* Columns + header */

  get orgState() { try { return JSON.parse(localStorage.getItem("pr_orgs")) || {}; } catch { return {}; } },

  set sidebarCollapsed(v) { localStorage.setItem("pr_sidebar", v ? "collapsed" : "open"); },

const $ = (id) => document.getElementById(id);
const userInputEl = $("userInput"), usersEl = $("users"), orgsEl = $("orgs"),
      periodsEl = $("periods"), filterEl = $("filter"), statusEl = $("status"), boardEl = $("board");
let filterText = "";
let loadMeta = "";      // "updated HH:MM · N API calls left" — set on each load
let loadFailed = [];    // users that failed to load on the last fetch

let currentPRs = [];   // last fetched PR set
let knownOrgs = [];    // orgs the viewer belongs to

/* ---- metallic hover sound (Web Audio, synthesized — no files) ---- */
let soundOn = store.sound;
let audioCtx = null;
let lastBlip = 0;

function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}

function playHover() {
  if (!soundOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  if (now - lastBlip < 0.04) return; // throttle rapid sweeps
  lastBlip = now;

  // bandpass gives the bright "metallic" tick; inharmonic partials = not a pure tone
  const bp = audioCtx.createBiquadFilter();
  bp.type = "bandpass"; bp.frequency.value = 3200; bp.Q.value = 6;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.gain.exponentialRampToValueAtTime(0.10, now + 0.004); // fast click attack
  master.gain.exponentialRampToValueAtTime(0.0001, now + 0.085); // short decay
  bp.connect(master); master.connect(audioCtx.destination);

  [2350, 3170, 4270].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = "square";
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.value = 1 / (i + 1.5);
    osc.connect(g); g.connect(bp);
    osc.start(now); osc.stop(now + 0.09);
  });
}

function renderSoundBtn() {
  $("sound").textContent = soundOn ? "🔊" : "🔇";
}

function setStatus(msg, isError) {

const PR_FRAGMENT = `
fragment PR on PullRequest {
  number title url isDraft state reviewDecision
  createdAt updatedAt mergedAt closedAt
  repository { nameWithOwner owner { login } }
  author { login avatarUrl }
  additions deletions
  reviews { totalCount }
  comments { totalCount }
  labels(first: 6) { nodes { name color } }
}`;

// --- request throttle + retry ---------------------------------------------
// GitHub sheds bursts of heavy queries with transient 502/503/504 (gateway
// timeout) and 403/429 (secondary rate limit) even when the hourly quota is
// fine. So we (a) cap how many requests are in flight at once to avoid spiking,
// and (b) retry transient failures with exponential backoff + jitter, honouring
// Retry-After when GitHub sends it. This is GitHub's documented guidance.
const MAX_CONCURRENT = 3;   // well under GitHub's 100-concurrent ceiling; avoids the burst
const MAX_TRIES = 5;
let inFlight = 0;
const waiters = [];
function acquireSlot() {
  if (inFlight < MAX_CONCURRENT) { inFlight++; return Promise.resolve(); }
  return new Promise(resolve => waiters.push(resolve));
}
function releaseSlot() {
  const next = waiters.shift();
  if (next) next(); else inFlight--; // hand the slot straight to a waiter, else free it
}
const sleep = ms => new Promise(r => setTimeout(r, ms));
const RETRYABLE = new Set([502, 503, 504, 403, 429]);

async function graphql(query) {
  await acquireSlot();
  try {
    for (let attempt = 1; ; attempt++) {
      let res;
      try {
        res = await fetch(GQL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query }) });
      } catch (netErr) {
        if (attempt >= MAX_TRIES) throw new Error("network error reaching server.js");
        await sleep(backoffMs(attempt)); continue;
      }
      if (RETRYABLE.has(res.status) && attempt < MAX_TRIES) {
        const ra = Number(res.headers.get("retry-after"));
        await sleep(ra > 0 ? ra * 1000 : backoffMs(attempt));
        continue;
      }
      if (!res.ok) throw new Error(`GitHub error ${res.status}${res.status >= 500 ? " — try Refresh" : ""}`);
      const json = await res.json();
      if (json.errors) throw new Error(json.errors.map(e => e.message).join("; "));
      return json.data;
    }
  } finally {
    releaseSlot();
  }
}
// exponential backoff (1s, 2s, 4s, 8s…) capped at 8s, with jitter to de-sync parallel retries
function backoffMs(attempt) { return Math.min(1000 * 2 ** (attempt - 1), 8000) + Math.floor(Math.random() * 400); }

async function fetchIdentity() {
  const data = await graphql(`query {
    viewer { login organizations(first: 100) { nodes { login } } }
  }`);
  return {
    login: data.viewer.login,
    orgs: (data.viewer.organizations?.nodes || []).map(o => o.login),
  };
}

// One page of a search. Page size is capped at 50 because the PR fragment pulls
// expensive fields (additions/deletions force a diff compute); asking for ~100
// PRs' worth at once trips GitHub's RESOURCE_LIMITS_EXCEEDED and nulls every node.
// Transient 502/503/504/403/429 are handled by graphql()'s retry/throttle layer.
async function searchPage(query, first, after) {
  const afterArg = after ? `, after: ${JSON.stringify(after)}` : "";
  return graphql(
    `query { search(query: ${JSON.stringify(query)}, type: ISSUE, first: ${first}${afterArg}) { nodes { ...PR } pageInfo { hasNextPage endCursor } } rateLimit { remaining } }\n${PR_FRAGMENT}`
  );
}

// Paginate a search up to `cap` results, 50 per page (safely under the resource limit).
async function searchPRs(query, cap) {
  const PAGE = 50;
  const nodes = []; let after = null, remaining = null;
  while (nodes.length < cap) {
    const data = await searchPage(query, Math.min(PAGE, cap - nodes.length), after);
    const s = data.search;
    for (const n of (s?.nodes || [])) if (n) nodes.push(n);
    remaining = data.rateLimit?.remaining ?? remaining;
    if (!s?.pageInfo?.hasNextPage) break;
    after = s.pageInfo.endCursor;
  }
  return { nodes, remaining };
}

// Fetch open and closed PRs in SEPARATE queries per user. A single combined
// query sorted by updated-desc mixes states, so a burst of recently-updated
// merged/closed PRs (e.g. during an org-wide audit) can push older-but-still-open
// PRs past the fetch cap and drop them from the board entirely. Open PRs are always
// shown regardless of age, so they get their own query and are fetched in full;
// closed/merged are bounded (the Period filter windows them anyway).
// Requests stay small and run in parallel — batching many into one aliased query
// makes GitHub's GraphQL time out (502).
async function fetchUserPRs(user) {
  const [open, closed] = await Promise.all([
    searchPRs(`author:${user} is:pr is:open sort:updated-desc`, 500),   // open: fetch (effectively) all
    searchPRs(`author:${user} is:pr is:closed sort:updated-desc`, 200), // recent closed/merged; Period windows it
  ]);
  return { nodes: [...open.nodes, ...closed.nodes], remaining: closed.remaining ?? open.remaining };
}

async function fetchPRs(users) {
  const results = await Promise.allSettled(users.map(u => fetchUserPRs(u)));
  const seen = new Set(); const prs = []; const failed = []; let remaining = null;
  results.forEach((r, i) => {
    if (r.status !== "fulfilled") { failed.push(users[i]); return; }
    if (r.value.remaining != null) remaining = r.value.remaining;
    for (const n of r.value.nodes) {
      if (!n || !n.number || seen.has(n.url)) continue;
      seen.add(n.url); prs.push(n);
    }
  });
  return { prs, remaining, failed };
}

function orgEnabled(login) { return store.orgState[login] !== false; }

// cutoff = oldest timestamp (ms) allowed in the windowed columns; -Infinity = no limit
function bucket(pr, cutoff) {
  if (pr.state === "MERGED")
    return (new Date(pr.mergedAt).getTime() >= cutoff) ? "merged" : null;
  if (pr.state === "CLOSED")
    return (new Date(pr.closedAt).getTime() >= cutoff) ? "closed" : null;
  if (pr.isDraft) return "draft";
  const reviewed = pr.reviewDecision === "APPROVED"
    || pr.reviewDecision === "CHANGES_REQUESTED"
    || (pr.reviews?.totalCount || 0) > 0;
  return reviewed ? "reviewed" : "needs";
}

function timeAgo(iso) {
  if (!iso) return "";
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  const u = [[31536000,"y"],[2592000,"mo"],[604800,"w"],[86400,"d"],[3600,"h"],[60,"m"]];
  for (const [secs, lbl] of u) if (s >= secs) return Math.floor(s / secs) + lbl;
  return "just now";
}

function reviewBadge(pr) {
  if (pr.reviewDecision === "APPROVED") return `<span class="badge approved">approved</span>`;
  if (pr.reviewDecision === "CHANGES_REQUESTED") return `<span class="badge changes">changes</span>`;
  if ((pr.reviews?.totalCount || 0) > 0) return `<span class="badge commented">reviewed</span>`;
  return "";
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function cardHTML(pr) {
  const ts = pr.state === "MERGED" ? pr.mergedAt : pr.state === "CLOSED" ? pr.closedAt : pr.updatedAt;
  const labels = (pr.labels?.nodes || []).map(l =>
    `<span class="lbl" style="background:#${l.color}22;border-color:#${l.color}88">${esc(l.name)}</span>`
  ).join("");
  return `<a class="card" href="${pr.url}" target="_blank" rel="noopener" data-url="${esc(pr.url)}">
    <div class="repo">${esc(pr.repository.nameWithOwner)}</div>
    <div class="title">${esc(pr.title)}</div>
    ${labels ? `<div class="labels">${labels}</div>` : ""}
    <div class="meta">
      <span class="num">#${pr.number}</span>
      <span class="author"><img class="avatar" src="${pr.author?.avatarUrl || ''}" alt=""/>${esc(pr.author?.login || "?")}</span>
      <span class="diff"><span class="add">+${pr.additions}</span> <span class="del">−${pr.deletions}</span></span>
      ${pr.comments?.totalCount ? `<span>💬 ${pr.comments.totalCount}</span>` : ""}
      ${reviewBadge(pr)}
      <span style="margin-left:auto">${timeAgo(ts)}</span>
    </div>
  </a>`;
}

function periodLabel() {
  const p = PERIODS.find(p => p.days === store.periodDays);
  return p ? p.label : `${store.periodDays}d`;
}

function render() {
  const days = store.periodDays;
  const cutoff = days == null ? -Infinity : Date.now() - days * DAY;
  const q = filterText.trim().toLowerCase();
  const prs = currentPRs.filter(pr => {
    if (!orgEnabled(pr.repository.owner.login)) return false;
    if (!q) return true;
    const hay = `${pr.title} ${pr.repository.nameWithOwner} ${pr.author?.login || ""} #${pr.number}`.toLowerCase();
    return hay.includes(q);
  });
  const cols = {}; COLUMNS.forEach(c => cols[c.key] = []);
  for (const pr of prs) { const b = bucket(pr, cutoff); if (b) cols[b].push(pr); }
  for (const c of COLUMNS) cols[c.key].sort((a, b) => {
    const ta = c.key === "merged" ? a.mergedAt : c.key === "closed" ? a.closedAt : a.updatedAt;
    const tb = c.key === "merged" ? b.mergedAt : c.key === "closed" ? b.closedAt : b.updatedAt;
    return new Date(tb) - new Date(ta);
  });
  const win = periodLabel();
  boardEl.innerHTML = COLUMNS.map(c => `
    <section class="column ${c.cls}">
      <div class="col-head"><span class="dot"></span>${c.label}${c.windowed ? ` <span class="win">· ${win}</span>` : ""}<span class="count">${cols[c.key].length}</span></div>
      <div class="col-body">
        ${cols[c.key].length ? cols[c.key].map(cardHTML).join("") : `<div class="empty">Nothing here</div>`}
      </div>
    </section>`).join("");

  // status: "X of Y shown" (X = visible after filters, Y = total loaded)
  const shown = COLUMNS.reduce((n, c) => n + cols[c.key].length, 0);
  const total = currentPRs.length;
  let s = shown === total ? `${total} PRs` : `${shown} of ${total} shown`;
  if (loadMeta) s += ` · ${loadMeta}`;
  if (loadFailed.length) setStatus(`${s} · couldn't load: ${loadFailed.join(", ")} (try Refresh)`, true);
  else setStatus(s);
}

function renderPeriods() {
  periodsEl.innerHTML = PERIODS.map(p =>
    `<span class="org ${p.days === store.periodDays ? "on" : ""}" data-days="${p.days == null ? "" : p.days}">${p.label}</span>`
  ).join("");
  periodsEl.querySelectorAll(".org").forEach(el => {
    el.onmouseover = playHover;
    el.onclick = () => {
      store.periodDays = el.dataset.days === "" ? null : Number(el.dataset.days);
      renderPeriods(); render();
    };
  });
}

function renderUsers() {
  const users = store.users, viewer = store.viewer;
  usersEl.innerHTML = users.map(u =>
    `<span class="chip ${u === viewer ? "me" : ""}">${esc(u)}${u === viewer ? " (you)" : ""}<button data-user="${esc(u)}" title="Remove">×</button></span>`
  ).join("");
  usersEl.querySelectorAll("button").forEach(b => b.onclick = () => {
    store.users = store.users.filter(u => u !== b.dataset.user);
    renderUsers(); load();
  });
}

function renderOrgs() {
  // union of orgs the viewer belongs to + owners actually present in results
  const owners = new Set(knownOrgs);
  for (const pr of currentPRs) owners.add(pr.repository.owner.login);
  const list = [...owners].sort((a, b) => a.localeCompare(b));
  if (!list.length) { orgsEl.innerHTML = `<span class="status">no orgs</span>`; return; }
  orgsEl.innerHTML = list.map(o =>
    `<span class="org ${orgEnabled(o) ? "on" : "off"}" data-org="${esc(o)}"><span class="tick">✓</span>${esc(o)}</span>`
  ).join("");
  orgsEl.querySelectorAll(".org").forEach(el => el.onclick = () => {
    const o = el.dataset.org, state = store.orgState;
    state[o] = !orgEnabled(o) ? true : false; // toggle
    store.orgState = state;
    renderOrgs(); render();
  });
}

function addUser(name) {
  name = name.trim().replace(/^@/, "");
  if (!name) return;
  const users = store.users;
  if (!users.includes(name)) { users.push(name); store.users = users; renderUsers(); load(); }
}

let loading = false;
async function load() {
  if (loading) return;
  // identify viewer + orgs once
  if (!store.viewer || !knownOrgs.length) {
    try {
      setStatus("Identifying you…");
      const { login, orgs } = await fetchIdentity();
      store.viewer = login; knownOrgs = orgs;
      if (store.users.length === 0) store.users = [login];
      renderUsers();
    } catch (e) { setStatus(e.message, true); return; }
  }
  if (store.users.length === 0) { store.users = [store.viewer]; renderUsers(); }

  loading = true; $("refresh").disabled = true;
  setStatus("Loading PRs…");
  try {
    const { prs, remaining, failed } = await fetchPRs(store.users);
    currentPRs = prs;
    prDetailCache.clear(); // board reloaded → drawer details are stale, refetch on next open
    const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    loadMeta = `updated ${now}${remaining != null ? ` · ${remaining} API calls left` : ""}`;
    loadFailed = failed;
    renderOrgs();
    render(); // render() writes the "X of Y shown" status using loadMeta/loadFailed
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    loading = false; $("refresh").disabled = false;
  }
}

const ddRoot = $("themeDD"), ddBtn = $("themeBtn"), ddMenu = $("themeMenu"), ddLabel = $("themeLabel");
const SWATCH_KEYS = ["accent", "needs", "reviewed", "merged", "closed"];

function buildThemeMenu() {
  ddMenu.innerHTML = Object.entries(THEMES).map(([name, t]) => {
    const sw = SWATCH_KEYS.map(k => `<i style="background:${t[k]}"></i>`).join("");
    return `<button class="dd-item" role="option" data-theme="${name}" tabindex="-1">
      <span class="sw">${sw}</span><span class="dd-name">${name}</span><span class="dd-check">✓</span>
    </button>`;
  }).join("");
}
function selectTheme(name) {
  store.theme = name; applyTheme(name); ddLabel.textContent = name;
  ddMenu.querySelectorAll(".dd-item").forEach(el =>
    el.classList.toggle("sel", el.dataset.theme === name));
}
function openDD(open) {
  ddRoot.classList.toggle("open", open);
  ddBtn.setAttribute("aria-expanded", open ? "true" : "false");
  if (open) { const sel = ddMenu.querySelector(".dd-item.sel"); if (sel) { sel.scrollIntoView({ block: "nearest" }); sel.focus(); } }
}

buildThemeMenu();
selectTheme(THEMES[store.theme] ? store.theme : DEFAULT_THEME);

ddBtn.onclick = (e) => { e.stopPropagation(); openDD(!ddRoot.classList.contains("open")); };
ddMenu.addEventListener("click", (e) => {
  const item = e.target.closest(".dd-item"); if (!item) return;
  selectTheme(item.dataset.theme); openDD(false); ddBtn.focus();
});
ddMenu.addEventListener("mouseover", (e) => { if (e.target.closest(".dd-item")) playHover(); });
ddMenu.addEventListener("keydown", (e) => {
  const items = [...ddMenu.querySelectorAll(".dd-item")];
  const i = items.indexOf(document.activeElement);
  if (e.key === "ArrowDown") { e.preventDefault(); (items[i + 1] || items[0]).focus(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); (items[i - 1] || items[items.length - 1]).focus(); }
  else if (e.key === "Escape") { openDD(false); ddBtn.focus(); }
});
ddBtn.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown" || e.key === "Enter" || e.key === " ") { e.preventDefault(); openDD(true); }
});
document.addEventListener("click", (e) => { if (!ddRoot.contains(e.target)) openDD(false); });

$("addUser").onclick = () => { addUser(userInputEl.value); userInputEl.value = ""; };
userInputEl.onkeydown = (e) => { if (e.key === "Enter") { addUser(userInputEl.value); userInputEl.value = ""; } };

/* ---- PR detail drawer ---------------------------------------------------- */
const drawerEl = $("prDrawer"), backdropEl = $("drawerBackdrop"),
      drawerBodyEl = $("drawerBody"), drawerRepoEl = $("drawerRepo"), drawerGhEl = $("drawerGh");
const fmtDate = (iso) => new Date(iso).toLocaleDateString([], { year: "numeric", month: "short", day: "numeric" });
const prDetailCache = new Map(); // pr.url -> fetched PR detail; cleared on board reload

function openDrawer() { drawerEl.classList.remove("hidden", "closing"); backdropEl.classList.remove("hidden"); }
function closeDrawer() {
  drawerEl.classList.add("closing");
  backdropEl.classList.add("hidden");
  setTimeout(() => drawerEl.classList.add("hidden"), 180);
}
$("drawerClose").onclick = closeDrawer;
backdropEl.onclick = closeDrawer;
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !drawerEl.classList.contains("hidden")) closeDrawer();
});

// Left-click a card → open the drawer. ⌘/Ctrl/Shift/middle-click still opens GitHub in a new tab.
boardEl.addEventListener("click", (e) => {
  const card = e.target.closest(".card");
  if (!card) return;
  if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
  e.preventDefault();
  const pr = currentPRs.find(p => p.url === card.dataset.url);
  if (pr) showPR(pr);
});

function stateClass(d) { return d.state === "MERGED" ? "merged" : d.state === "CLOSED" ? "closed" : d.isDraft ? "draft" : "open"; }
function stateLabel(d) { return d.state === "MERGED" ? "Merged" : d.state === "CLOSED" ? "Closed" : d.isDraft ? "Draft" : "Open"; }

async function showPR(pr) {
  const [owner, repo] = pr.repository.nameWithOwner.split("/");
  drawerRepoEl.textContent = `${pr.repository.nameWithOwner} #${pr.number}`;
  drawerGhEl.href = pr.url;
  openDrawer();
  const cached = prDetailCache.get(pr.url); // reuse until the next board reload
  if (cached) { renderDrawer(cached); return; }
  drawerBodyEl.innerHTML = `<div class="drawer-loading">Loading…</div>`;
  try {
    const data = await graphql(`query { repository(owner: ${JSON.stringify(owner)}, name: ${JSON.stringify(repo)}) {
      pullRequest(number: ${pr.number}) {
        number title url state isDraft createdAt
        author { login avatarUrl }
        baseRefName headRefName additions deletions changedFiles
        labels(first: 20) { nodes { name color } }
        bodyHTML
        timelineItems(first: 100, itemTypes: [
          ISSUE_COMMENT, PULL_REQUEST_REVIEW, PULL_REQUEST_COMMIT, REVIEW_REQUESTED_EVENT,
          LABELED_EVENT, UNLABELED_EVENT, RENAMED_TITLE_EVENT, HEAD_REF_FORCE_PUSHED_EVENT,
          READY_FOR_REVIEW_EVENT, CONVERT_TO_DRAFT_EVENT, ASSIGNED_EVENT,
          MERGED_EVENT, CLOSED_EVENT, REOPENED_EVENT, CROSS_REFERENCED_EVENT
        ]) {
          totalCount
          nodes {
            __typename
            ... on IssueComment { author { login avatarUrl } createdAt bodyHTML }
            ... on PullRequestReview { author { login avatarUrl } createdAt state bodyHTML }
            ... on PullRequestCommit { commit { abbreviatedOid messageHeadline committedDate author { user { login } name } } }
            ... on ReviewRequestedEvent { actor { login } createdAt requestedReviewer { __typename ... on User { login } ... on Team { name } } }
            ... on LabeledEvent { actor { login } createdAt label { name color } }
            ... on UnlabeledEvent { actor { login } createdAt label { name color } }
            ... on RenamedTitleEvent { actor { login } createdAt previousTitle currentTitle }
            ... on HeadRefForcePushedEvent { actor { login } createdAt beforeCommit { abbreviatedOid } afterCommit { abbreviatedOid } }
            ... on ReadyForReviewEvent { actor { login } createdAt }
            ... on ConvertToDraftEvent { actor { login } createdAt }
            ... on AssignedEvent { actor { login } createdAt assignee { __typename ... on User { login } } }
            ... on MergedEvent { actor { login } createdAt commit { abbreviatedOid } mergeRefName }
            ... on ClosedEvent { actor { login } createdAt }
            ... on ReopenedEvent { actor { login } createdAt }
            ... on CrossReferencedEvent { actor { login } createdAt source { __typename ... on PullRequest { number title url repository { nameWithOwner } } ... on Issue { number title url repository { nameWithOwner } } } }
          }
        }
        reviewThreads(first: 50) {
          nodes {
            isResolved isOutdated path line
            comments(first: 50) { nodes { author { login avatarUrl } createdAt bodyHTML diffHunk } }
          }
        }
      }
    } }`);
    const d = data.repository?.pullRequest;
    if (!d) throw new Error("not found");
    prDetailCache.set(pr.url, d);
    renderDrawer(d);
  } catch (e) {
    drawerBodyEl.innerHTML = `<div class="drawer-error">Couldn't load this PR: ${esc(e.message)}</div>`;
  }
}

// bodyHTML / timeline HTML come pre-sanitized from GitHub's GraphQL API.
function renderDrawer(d) {
  const labels = (d.labels?.nodes || []).map(l =>
    `<span class="lbl" style="background:#${l.color}22;border-color:#${l.color}88">${esc(l.name)}</span>`).join("");
  const items = (d.timelineItems?.nodes || []).map(renderTimelineItem).join("");
  const threads = d.reviewThreads?.nodes || [];
  const unresolved = threads.filter(t => !t.isResolved).length;
  const threadsHTML = threads.length
    ? `<div class="pr-section-title">Review threads (${unresolved} unresolved / ${threads.length})</div>${threads.map(renderThread).join("")}`
    : "";
  drawerBodyEl.innerHTML = `
    <h1 class="pr-title">${esc(d.title)} <span class="num">#${d.number}</span></h1>
    <div class="pr-sub">
      <span class="pr-state ${stateClass(d)}">${stateLabel(d)}</span>
      <span class="author"><img class="avatar" src="${d.author?.avatarUrl || ''}" alt=""/>${esc(d.author?.login || '?')}</span>
      <span>opened ${fmtDate(d.createdAt)}</span>
      <span class="diff"><span class="add">+${d.additions}</span> <span class="del">−${d.deletions}</span> · ${d.changedFiles} files</span>
    </div>
    <div class="pr-sub pr-branches">wants to merge <code>${esc(d.headRefName)}</code> into <code>${esc(d.baseRefName)}</code></div>
    ${labels ? `<div class="labels">${labels}</div>` : ""}
    <div class="pr-section-title">Description</div>
    <div class="pr-body">${d.bodyHTML || '<em style="color:var(--muted)">No description provided.</em>'}</div>
    ${threadsHTML}
    <div class="pr-section-title">Timeline</div>
    <div class="timeline">${items || '<div class="drawer-loading">No activity yet.</div>'}</div>
  `;
  drawerBodyEl.scrollTop = 0;
}

const reviewTag = { APPROVED: ["approved", "reviewed"], CHANGES_REQUESTED: ["changes", "requested changes"], COMMENTED: ["commented", "reviewed"], DISMISSED: ["commented", "review dismissed"] };

// last few lines of a diff hunk = the context around the commented line
function lastHunkLines(hunk, n = 4) { return (hunk || "").split("\n").slice(-n).join("\n"); }
// color each diff line by its leading marker (+ add, - del, @@ hunk, else context)
function renderDiffHunk(hunk) {
  return lastHunkLines(hunk).split("\n").map(line => {
    const cls = line[0] === "+" ? "add" : line[0] === "-" ? "del" : line[0] === "@" ? "hunk" : "ctx";
    return `<span class="dl ${cls}">${esc(line) || "&nbsp;"}</span>`;
  }).join("");
}

// A review thread = the inline diff comments on one line (original + replies), with status.
function renderThread(t) {
  const loc = esc(t.path || "(file)") + (t.line ? ":" + t.line : "");
  const cs = t.comments?.nodes || [];
  const diff = cs[0]?.diffHunk ? `<pre class="rc-diff">${renderDiffHunk(cs[0].diffHunk)}</pre>` : "";
  const comments = cs.map(c => `
    <div class="tc">
      <div class="rc-head"><img class="avatar" src="${c.author?.avatarUrl || ''}" alt=""/><span class="who">${esc(c.author?.login || '?')}</span><span class="when">${fmtDate(c.createdAt)}</span></div>
      <div class="comment-body">${c.bodyHTML || ''}</div>
    </div>`).join("");
  const tags = `<span class="thread-tag ${t.isResolved ? 'resolved' : 'unresolved'}">${t.isResolved ? 'resolved' : 'unresolved'}</span>${t.isOutdated ? '<span class="thread-tag outdated">outdated</span>' : ''}`;
  return `<details class="thread"${t.isResolved ? "" : " open"}>
    <summary><span class="rc-loc">${loc}</span>${tags}</summary>
    ${diff}${comments}
  </details>`;
}

function oct(name) { return `<svg class="oct" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">${OCTICON[name] || ""}</svg>`; }

function renderTimelineItem(n) {
  const who = (s) => `<b>${esc((s && s.login) || "someone")}</b>`;
  const badge = (name, color) => `<span class="tl-badge ${color}">${oct(name)}</span>`;
  const item = (b, content) => `<div class="tl-item"><span class="tl-gutter">${b}</span><div class="tl-content">${content}</div></div>`;
  const box = (avatar, head, bodyHTML) =>
    `<div class="comment"><div class="comment-head"><img class="avatar" src="${avatar || ''}" alt=""/>${head}</div>${bodyHTML ? `<div class="comment-body">${bodyHTML}</div>` : ""}</div>`;
  const ev = (name, color, html, when) =>
    item(badge(name, color), `<div class="tl-event"><span class="tl-text">${html}</span><span class="tl-when">${when ? fmtDate(when) : ""}</span></div>`);

  switch (n.__typename) {
    case "IssueComment":
      return item(badge("comment", "gray"), box(n.author?.avatarUrl, `${who(n.author)}<span class="when">${fmtDate(n.createdAt)}</span>`, n.bodyHTML));
    case "PullRequestReview": {
      const [cls, label] = reviewTag[n.state] || ["commented", "reviewed"];
      const color = cls === "approved" ? "green" : cls === "changes" ? "red" : "gray";
      const head = `${who(n.author)}<span class="review-tag ${cls}">${label}</span><span class="when">${fmtDate(n.createdAt)}</span>`;
      return item(badge("eye", color), box(n.author?.avatarUrl, head, n.bodyHTML));
    }
    case "PullRequestCommit": {
      const c = n.commit, author = c.author?.user?.login || c.author?.name || "";
      return ev("git-commit", "gray", `<b>${esc(author)}</b> added commit <code>${esc(c.abbreviatedOid)}</code> ${esc(c.messageHeadline)}`, c.committedDate);
    }
    case "ReviewRequestedEvent":
      return ev("eye", "gray", `${who(n.actor)} requested review from <b>${esc(n.requestedReviewer?.login || n.requestedReviewer?.name || "?")}</b>`, n.createdAt);
    case "LabeledEvent":
      return ev("tag", "gray", `${who(n.actor)} added <span class="lbl" style="background:#${n.label.color}22;border-color:#${n.label.color}88">${esc(n.label.name)}</span>`, n.createdAt);
    case "UnlabeledEvent":
      return ev("tag", "gray", `${who(n.actor)} removed <span class="lbl" style="background:#${n.label.color}22;border-color:#${n.label.color}88">${esc(n.label.name)}</span>`, n.createdAt);
    case "RenamedTitleEvent":
      return ev("pencil", "gray", `${who(n.actor)} changed the title to <b>${esc(n.currentTitle)}</b>`, n.createdAt);
    case "HeadRefForcePushedEvent":
      return ev("git-commit", "gray", `${who(n.actor)} force-pushed <code>${esc(n.beforeCommit?.abbreviatedOid || "")}</code> → <code>${esc(n.afterCommit?.abbreviatedOid || "")}</code>`, n.createdAt);
    case "ReadyForReviewEvent":
      return ev("git-pull-request", "green", `${who(n.actor)} marked this ready for review`, n.createdAt);
    case "ConvertToDraftEvent":
      return ev("git-pull-request-draft", "gray", `${who(n.actor)} converted this to draft`, n.createdAt);
    case "AssignedEvent":
      return ev("person", "gray", `${who(n.actor)} assigned <b>${esc(n.assignee?.login || "?")}</b>`, n.createdAt);
    case "MergedEvent":
      return ev("git-merge", "purple", `${who(n.actor)} merged <code>${esc(n.commit?.abbreviatedOid || "")}</code> into <code>${esc(n.mergeRefName)}</code>`, n.createdAt);
    case "ClosedEvent":
      return ev("git-pull-request-closed", "red", `${who(n.actor)} closed this`, n.createdAt);
    case "ReopenedEvent":
      return ev("dot-fill", "green", `${who(n.actor)} reopened this`, n.createdAt);
    case "CrossReferencedEvent": {
      const s = n.source || {};
      return ev("cross-reference", "gray", `${who(n.actor)} referenced this in <a href="${s.url}" target="_blank" rel="noopener">${esc(s.repository?.nameWithOwner || "")}#${s.number}</a>`, n.createdAt);
    }
    default:
      return "";
  }
}

// Gate the board behind GitHub sign-in when the server is in hosted (OAuth) mode.
async function boot() {
  let cfg;
  try { cfg = await (await fetch("/api/config")).json(); }
  catch { cfg = { oauth: false, authenticated: true }; } // treat unreachable config as local mode

  if (cfg.oauth && !cfg.authenticated) {
    $("loginOverlay").classList.remove("hidden");
    return; // don't touch GitHub until the user has signed in
  }
  $("loginOverlay").classList.add("hidden");

  if (cfg.user && cfg.user.login) {
    // if a different account signed in on this browser, drop the previous user's list
    if (store.viewer && store.viewer !== cfg.user.login) store.users = [];
    store.viewer = cfg.user.login;
    $("auth").innerHTML =
      `<img class="avatar" src="${cfg.user.avatar}" alt=""/>` +
      `<span class="who">${esc(cfg.user.login)}</span>` +
      `<a class="logout" href="/logout">Log out</a>`;
  }

  renderUsers();
  renderPeriods();
  load();
  setInterval(load, 5 * 60 * 1000); // auto-refresh every 5 min
}
boot();
